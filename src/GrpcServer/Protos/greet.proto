syntax = "proto3";

option csharp_namespace = "GrpcServer";

package greet;

// The greeting service definition.
service Greeter {
  // Sends a greeting
  rpc SayHello (HelloRequest) returns (HelloReply);
}

// The request message containing the user's name.
message HelloRequest {
  string name = 1;
}

// The response message containing the greetings.
message HelloReply {
  string message = 1;
}

service Admin {
    rpc BuscarToken(BuscarTokenRequest) returns (BuscarTokenReply);
}

message BuscarTokenRequest {
    string username = 1;
    string password = 2;
}

message BuscarTokenReply {
    string token = 1;
}